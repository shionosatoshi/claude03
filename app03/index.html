<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Memo Notes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6' rx='20'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E📝%3C/text%3E%3C/svg%3E">
    <title>Memo Notes - メモアプリ</title>
    <link rel="stylesheet" href="../common/vercel-vars.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Memo Notes</h1>
            <p class="subtitle">シンプルなメモ・ノートアプリ</p>
        </header>

        <!-- 検索・追加セクション -->
        <section class="action-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 メモを検索..." maxlength="100">
            </div>
            <button id="addNoteBtn" class="btn btn-primary btn-large">
                <span class="btn-icon">➕</span>
                <span>新規メモ</span>
            </button>
        </section>

        <!-- カテゴリフィルター -->
        <section class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all">すべて</button>
                <button class="filter-btn" data-category="personal">👤 個人</button>
                <button class="filter-btn" data-category="work">💼 仕事</button>
                <button class="filter-btn" data-category="idea">💡 アイデア</button>
                <button class="filter-btn" data-category="other">📌 その他</button>
            </div>
        </section>

        <!-- メモ一覧セクション -->
        <section class="notes-section">
            <div class="section-header">
                <h2>📋 メモ一覧</h2>
                <span id="noteCount" class="note-count">0件</span>
            </div>
            <div id="notesList" class="notes-list">
                <div class="empty-state" id="emptyState">
                    <p>📝 メモがありません</p>
                    <p class="empty-hint">「新規メモ」ボタンで最初のメモを作成しましょう！</p>
                </div>
            </div>
        </section>

        <footer>
            <p class="footer-text">💾 メモはブラウザに自動保存されます</p>
        </footer>
    </div>

    <!-- メモ編集モーダル -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新規メモ</h2>
                <button id="closeModalBtn" class="close-btn">×</button>
            </div>
            <form id="noteForm" class="note-form">
                <div class="form-group">
                    <label for="noteTitle">タイトル</label>
                    <input type="text" id="noteTitle" placeholder="メモのタイトル" maxlength="100" required>
                </div>
                <div class="form-group">
                    <label for="noteCategory">カテゴリ</label>
                    <select id="noteCategory" required>
                        <option value="personal">👤 個人</option>
                        <option value="work">💼 仕事</option>
                        <option value="idea">💡 アイデア</option>
                        <option value="other">📌 その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="noteContent">本文</label>
                    <textarea id="noteContent" placeholder="メモの内容を入力..." maxlength="1000" required></textarea>
                    <div class="char-count">
                        <span id="charCount">0</span>/1000
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">キャンセル</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 削除確認モーダル -->
    <div id="deleteModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>削除の確認</h2>
                <button id="closeDeleteModalBtn" class="close-btn">×</button>
            </div>
            <div class="delete-confirmation">
                <p>このメモを削除してもよろしいですか？</p>
                <p class="delete-warning">⚠️ この操作は取り消せません</p>
            </div>
            <div class="form-actions">
                <button type="button" id="cancelDeleteBtn" class="btn btn-secondary">キャンセル</button>
                <button type="button" id="confirmDeleteBtn" class="btn btn-danger">削除</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Service Workerの登録（HTTP/HTTPSのみ）
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker登録成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('ServiceWorker登録失敗:', error);
                    });
            });
        }
    </script>
</body>
</html>
